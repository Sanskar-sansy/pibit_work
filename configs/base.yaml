# Base configuration for the prompt optimization pipeline
experiment:
  name: "prompt_optimization_run"
  random_seed: 42
  output_dir: "./runs"
  reports_dir: "./reports"
  logs_dir: "./logs"

ollama:
  base_url: "http://localhost:11434"
  timeout: 600
  max_retries: 3
  retry_delay: 2.0

database:
  url: "sqlite:///./runs/experiments.db"
  echo: false

cache:
  enabled: true
  dir: "./data/cache"
  ttl_hours: 168  # 1 week

logging:
  level: "INFO"
  format: "rich"
  file_enabled: true

pipeline:
  mode: "optimize"       # optimize | evaluate | report | resume
  dataset: "resume_bench"  # key from datasets.yaml
  model: "llama3"       # key from models.yaml
  optimizer: "beam"      # key from optimizer.yaml
  max_budget: 10   # max LLM calls for optimization
  validation_split: 0.5
  test_split: 0.0
  batch_size: 2         # samples per evaluation round
